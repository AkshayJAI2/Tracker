<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strive Pro | Identity Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .pillar-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .pillar-character { border-left: 4px solid #a855f7; }
        .pillar-health { border-left: 4px solid #10b981; }
        .pillar-wealth { border-left: 4px solid #f59e0b; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { color: #3b82f6 !important; }
        .cal-day.selected { background: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="pb-28">

    <!-- HEADER -->
    <header class="p-6 max-w-2xl mx-auto flex justify-between items-center">
        <div>
            <p class="text-[10px] font-bold text-blue-500 tracking-[0.2em] uppercase">Identity Architect</p>
            <h1 class="text-2xl font-extrabold tracking-tighter">STRIVE <span class="text-slate-500">PRO</span></h1>
        </div>
        <button onclick="openSync()" class="p-2 bg-slate-800 rounded-full">
            <div id="sync-dot" class="w-2 h-2 rounded-full bg-red-500"></div>
        </button>
    </header>

    <!-- MAIN TRACKING -->
    <main id="tab-tracking" class="tab-content active p-4 max-w-2xl mx-auto space-y-8">
        
        <!-- CHARACTER PILLAR -->
        <section>
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-sm font-black text-purple-400 uppercase tracking-widest flex items-center gap-2">
                    <i data-lucide="shield-check" class="w-4 h-4"></i> Character (Awareness)
                </h2>
                <span class="text-[10px] text-slate-500 font-bold">PRIORITY 01</span>
            </div>
            <div id="list-character" class="space-y-3"></div>
        </section>

        <!-- HEALTH PILLAR -->
        <section>
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-sm font-black text-emerald-400 uppercase tracking-widest flex items-center gap-2">
                    <i data-lucide="zap" class="w-4 h-4"></i> Health (Vitality)
                </h2>
                <span class="text-[10px] text-slate-500 font-bold">PRIORITY 02</span>
            </div>
            <div id="list-health" class="space-y-3"></div>
        </section>

        <!-- WEALTH PILLAR -->
        <section>
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-sm font-black text-amber-400 uppercase tracking-widest flex items-center gap-2">
                    <i data-lucide="trending-up" class="w-4 h-4"></i> Wealth (Skills)
                </h2>
                <span class="text-[10px] text-slate-500 font-bold">PRIORITY 03</span>
            </div>
            <div id="list-wealth" class="space-y-3"></div>
        </section>

        <button onclick="openModal()" class="w-full py-4 rounded-2xl bg-slate-900 border border-white/5 text-slate-400 text-xs font-bold uppercase tracking-widest hover:bg-slate-800">
            + Add New Objective
        </button>
    </main>

    <!-- ANALYTICS -->
    <main id="tab-stats" class="tab-content p-4 max-w-2xl mx-auto">
        <h2 class="text-2xl font-bold mb-6">Performance</h2>
        <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="glass p-4 rounded-2xl text-center">
                <p class="text-[10px] font-bold text-slate-500 mb-1">DAILY</p>
                <div id="stat-daily" class="text-xl font-black">0%</div>
            </div>
            <div class="glass p-4 rounded-2xl text-center">
                <p class="text-[10px] font-bold text-slate-500 mb-1">STREAK</p>
                <div id="stat-streak" class="text-xl font-black text-orange-500">0</div>
            </div>
            <div class="glass p-4 rounded-2xl text-center">
                <p class="text-[10px] font-bold text-slate-500 mb-1">SYNC</p>
                <div class="flex justify-center"><i data-lucide="cloud-check" class="w-5 h-5 text-emerald-500"></i></div>
            </div>
        </div>
        <div class="glass p-6 rounded-[2rem]">
            <canvas id="trendChart"></canvas>
        </div>
    </main>

    <!-- NAV -->
    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/5 px-12 py-6 flex justify-around items-center z-40 rounded-t-[2.5rem]">
        <button onclick="switchTab('tracking')" id="nav-tracking" class="nav-active"><i data-lucide="target" class="w-6 h-6"></i></button>
        <button onclick="switchTab('stats')" id="nav-stats" class="text-slate-500"><i data-lucide="bar-chart-3" class="w-6 h-6"></i></button>
    </nav>

    <!-- MODALS (Unified for simplicity) -->
    <div id="modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden z-50 p-6 flex items-center justify-center">
        <div class="glass w-full max-w-sm p-8 rounded-[2.5rem] space-y-4">
            <h3 class="text-xl font-bold">New Objective</h3>
            <input type="text" id="obj-name" placeholder="Objective name..." class="w-full bg-slate-800 rounded-xl p-4 text-white outline-none">
            <select id="obj-pillar" class="w-full bg-slate-800 rounded-xl p-4 text-white outline-none">
                <option value="character">Character</option>
                <option value="health">Health</option>
                <option value="wealth">Wealth</option>
            </select>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 text-slate-500 font-bold">Cancel</button>
                <button onclick="saveObjective()" class="flex-1 bg-blue-600 py-4 rounded-xl font-bold">Add</button>
            </div>
        </div>
    </div>

    <!-- SYNC MODAL -->
    <div id="sync-modal" class="fixed inset-0 bg-black/90 hidden z-50 p-6 flex items-center justify-center">
        <div class="glass w-full max-w-sm p-8 rounded-[2.5rem]">
            <h3 class="text-xl font-bold mb-4">Cloud Sync</h3>
            <input type="text" id="sync-key" placeholder="Enter Secret Key" class="w-full bg-slate-800 rounded-xl p-4 mb-4 text-center font-mono">
            <button onclick="connectSync()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">Initialize Sync</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your Config
        const firebaseConfig = { apiKey: "AIzaSyB6GmKQYMJAd3L_pRybY24XVm8G2yZHHdo", authDomain: "tracker-9b741.firebaseapp.com", projectId: "tracker-9b741", storageBucket: "tracker-9b741.firebasestorage.app", messagingSenderId: "54605694023", appId: "1:54605694023:web:d243d9854b2f8f78065d62" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let items = [];
        let syncKey = localStorage.getItem('strive_pro_key');

        // INITIAL SETUP (The default items you requested)
        const defaults = [
            { id: '1', name: 'Thought Awareness', pillar: 'character', logs: [] },
            { id: '2', name: 'Positive Vocabulary', pillar: 'character', logs: [] },
            { id: '3', name: 'Reading/Podcasts', pillar: 'character', logs: [] },
            { id: '4', name: 'Exercise (Strength/Cardio)', pillar: 'health', logs: [] },
            { id: '5', name: 'Clean Diet', pillar: 'health', logs: [] },
            { id: '6', name: 'Deep Breathing', pillar: 'health', logs: [] },
            { id: '7', name: 'Gen AI Practice', pillar: 'wealth', logs: [] },
            { id: '8', name: 'Market Trading Study', pillar: 'wealth', logs: [] },
            { id: '9', name: 'Business Outreach', pillar: 'wealth', logs: [] }
        ];

        window.onload = () => {
            if (syncKey) {
                setupSync(syncKey);
            } else {
                items = JSON.parse(localStorage.getItem('strive_items')) || defaults;
                render();
            }
            lucide.createIcons();
        };

        async function setupSync(key) {
            const docRef = doc(db, "trackers", key);
            onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                    items = snap.data().items || [];
                    render();
                    document.getElementById('sync-dot').className = "w-2 h-2 rounded-full bg-emerald-500";
                }
            });
        }

        window.toggleItem = async (id) => {
            const item = items.find(i => i.id === id);
            const today = new Date().toISOString().split('T')[0];
            const idx = item.logs.indexOf(today);
            
            if(idx > -1) {
                item.logs.splice(idx, 1);
            } else {
                item.logs.push(today);
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 }, colors: ['#3b82f6', '#a855f7', '#10b981'] });
            }
            
            save();
            render();
        };

        function save() {
            localStorage.setItem('strive_items', JSON.stringify(items));
            if (syncKey) setDoc(doc(db, "trackers", syncKey), { items });
        }

        function render() {
            const containers = {
                character: document.getElementById('list-character'),
                health: document.getElementById('list-health'),
                wealth: document.getElementById('list-wealth')
            };

            Object.values(containers).forEach(c => c.innerHTML = '');
            const today = new Date().toISOString().split('T')[0];

            items.forEach(item => {
                const isDone = item.logs.includes(today);
                const el = document.createElement('div');
                el.className = `pillar-card pillar-${item.pillar} glass p-4 rounded-2xl flex items-center justify-between ${isDone ? 'opacity-50' : ''}`;
                el.innerHTML = `
                    <div class="flex items-center gap-4">
                        <button onclick="toggleItem('${item.id}')" class="w-12 h-12 rounded-xl border-2 flex items-center justify-center transition-all ${isDone ? 'bg-blue-600 border-blue-600 shadow-lg shadow-blue-500/20' : 'border-slate-700'}">
                            ${isDone ? '<i data-lucide="check" class="text-white w-6 h-6"></i>' : ''}
                        </button>
                        <div>
                            <h3 class="text-sm font-bold ${isDone ? 'line-through' : ''}">${item.name}</h3>
                            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">Current Streak: ${calcStreak(item)} Days</p>
                        </div>
                    </div>
                    <button onclick="deleteItem('${item.id}')" class="p-2 text-slate-800 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                `;
                containers[item.pillar].appendChild(el);
            });
            lucide.createIcons();
        }

        function calcStreak(item) {
            let streak = 0;
            let d = new Date();
            while(item.logs.includes(d.toISOString().split('T')[0])) {
                streak++;
                d.setDate(d.getDate() - 1);
            }
            return streak;
        }

        // Global functions for buttons
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.add('text-slate-500'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`nav-${tab}`).classList.remove('text-slate-500');
            document.getElementById(`nav-${tab}`).classList.add('nav-active');
        };

        window.openModal = () => document.getElementById('modal').style.display = 'flex';
        window.closeModal = () => document.getElementById('modal').style.display = 'none';
        window.saveObjective = () => {
            const name = document.getElementById('obj-name').value;
            const pillar = document.getElementById('obj-pillar').value;
            if(!name) return;
            items.push({ id: Date.now().toString(), name, pillar, logs: [] });
            save(); render(); closeModal();
        };
        window.deleteItem = (id) => {
            if(confirm('Remove this objective?')) {
                items = items.filter(i => i.id !== id);
                save(); render();
            }
        };
        window.openSync = () => document.getElementById('sync-modal').style.display = 'flex';
        window.connectSync = () => {
            syncKey = document.getElementById('sync-key').value.trim();
            if(syncKey) {
                localStorage.setItem('strive_pro_key', syncKey);
                location.reload();
            }
        };
    </script>
</body>
</html>
