<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strive Pro | Identity Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap');
        :root { --bg: #020617; --accent: #3b82f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f8fafc; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .date-chip.selected { background: var(--accent); transform: scale(1.05); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); border: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; position: absolute; left: 0; right: 0; top: 0; bottom: 0; width: auto; height: auto; color: transparent; background: transparent; }
    </style>
</head>
<body class="pb-32">

    <!-- HEADER -->
    <header class="p-6 max-w-2xl mx-auto flex justify-between items-center">
        <div>
            <p class="text-[10px] font-black text-blue-500 tracking-[0.3em] uppercase">Identity System</p>
            <h1 class="text-2xl font-extrabold tracking-tighter">STRIVE <span class="text-slate-500">PRO</span></h1>
        </div>
        <div class="flex gap-2">
            <!-- CALENDAR JUMP -->
            <div class="relative p-3 glass rounded-full w-11 h-11 flex items-center justify-center overflow-hidden">
                <i data-lucide="calendar" class="w-5 h-5 text-slate-400"></i>
                <input type="date" id="calendar-jump" onchange="window.jumpToDate(this.value)" class="opacity-0 absolute inset-0 z-20">
            </div>
            <!-- SYNC STATUS -->
            <button onclick="window.openSync()" class="p-3 glass rounded-full relative">
                <div id="sync-dot" class="w-2 h-2 rounded-full bg-red-500"></div>
            </button>
        </div>
    </header>

    <!-- HORIZONTAL DATE NAV -->
    <div id="date-slider" class="flex gap-3 overflow-x-auto no-scrollbar px-6 mb-8 max-w-2xl mx-auto scroll-smooth"></div>

    <!-- MAIN TRACKING -->
    <main id="tab-tracking" class="tab-content active p-4 max-w-2xl mx-auto space-y-8">
        <div id="pillars-render-area" class="space-y-10"></div>
        <button onclick="window.openModal()" class="w-full py-5 rounded-[2rem] border-2 border-dashed border-white/10 text-slate-500 font-bold text-[10px] uppercase tracking-[0.2em] hover:border-blue-500/50 hover:text-blue-400 transition-all">
            + Architect New Objective
        </button>
    </main>

    <!-- ANALYTICS -->
    <main id="tab-stats" class="tab-content p-4 max-w-2xl mx-auto space-y-6">
        <div class="flex bg-slate-900/80 p-1.5 rounded-2xl w-full max-w-[300px] mx-auto border border-white/5">
            <button onclick="window.updateAnalysis('day')" id="btn-day" class="flex-1 py-2 text-[10px] font-black rounded-xl transition-all">DAILY</button>
            <button onclick="window.updateAnalysis('week')" id="btn-week" class="flex-1 py-2 text-[10px] font-black rounded-xl transition-all text-slate-500">WEEKLY</button>
            <button onclick="window.updateAnalysis('month')" id="btn-month" class="flex-1 py-2 text-[10px] font-black rounded-xl transition-all text-slate-500">MONTHLY</button>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-6 rounded-[2rem] border-b-4 border-blue-500">
                <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Success Rate</p>
                <h3 id="stat-pct" class="text-3xl font-black text-white">0%</h3>
            </div>
            <div class="glass p-6 rounded-[2rem] border-b-4 border-orange-500">
                <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Max Chain</p>
                <h3 id="stat-streak" class="text-3xl font-black text-white">0</h3>
            </div>
        </div>

        <div class="glass p-6 rounded-[2.5rem] min-h-[300px]">
            <canvas id="analysisChart"></canvas>
        </div>
    </main>

    <!-- NAVIGATION -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[85%] max-w-sm glass rounded-full p-2 flex justify-between z-50 shadow-2xl border border-white/10">
        <button onclick="window.switchTab('tracking')" id="nav-tracking" class="flex-1 py-4 rounded-full flex justify-center text-blue-500 bg-blue-500/10 transition-all"><i data-lucide="target" class="w-6 h-6"></i></button>
        <button onclick="window.switchTab('stats')" id="nav-stats" class="flex-1 py-4 rounded-full flex justify-center text-slate-500 transition-all"><i data-lucide="bar-chart-3" class="w-6 h-6"></i></button>
    </nav>

    <!-- MODALS -->
    <div id="sync-modal" class="fixed inset-0 bg-black/95 hidden z-[100] p-6 flex items-center justify-center backdrop-blur-xl">
        <div class="glass w-full max-w-sm p-8 rounded-[2.5rem] text-center">
            <h3 class="text-xl font-bold mb-4">Cloud Sync</h3>
            <input type="text" id="sync-key-input" placeholder="Unique Secret Key" class="w-full bg-slate-800 rounded-xl p-4 text-center mb-4 text-white outline-none">
            <button onclick="window.connectSync()" class="w-full bg-blue-600 py-4 rounded-xl font-bold mb-4 shadow-lg shadow-blue-600/30">Activate</button>
            <button onclick="window.closeSync()" class="text-slate-500 text-sm">Close</button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-[100] p-6 flex items-center justify-center">
        <div class="glass w-full max-w-sm p-8 rounded-[2.5rem] space-y-4">
            <h3 class="text-xl font-bold">New Objective</h3>
            <input type="text" id="obj-name" placeholder="E.g. Morning Focus" class="w-full bg-slate-800 rounded-xl p-4 text-white outline-none">
            <select id="obj-pillar" class="w-full bg-slate-800 rounded-xl p-4 text-white">
                <option value="character">Character</option>
                <option value="health">Health</option>
                <option value="wealth">Wealth</option>
            </select>
            <button onclick="window.saveObjective()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">Create</button>
            <button onclick="window.closeModal()" class="w-full text-slate-500 text-sm">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyB6GmKQYMJAd3L_pRybY24XVm8G2yZHHdo", authDomain: "tracker-9b741.firebaseapp.com", projectId: "tracker-9b741", storageBucket: "tracker-9b741.firebasestorage.app", messagingSenderId: "54605694023", appId: "1:54605694023:web:d243d9854b2f8f78065d62" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let items = JSON.parse(localStorage.getItem('strive_v3')) || [];
        let selectedDate = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD format
        let syncKey = localStorage.getItem('strive_pro_key');
        let chart = null;

        // --- CALENDAR & NAV LOGIC ---
        window.jumpToDate = (dateString) => {
            if(!dateString) return;
            selectedDate = dateString;
            window.renderDateSlider();
            window.render();
            // Pulse the horizontal slider for feedback
            document.getElementById('date-slider').scrollLeft = 9999;
        };

        window.renderDateSlider = () => {
            const slider = document.getElementById('date-slider');
            slider.innerHTML = '';
            // Show last 14 days relative to today
            for(let i = 14; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const ds = d.toLocaleDateString('en-CA');
                const active = ds === selectedDate;
                
                slider.innerHTML += `
                    <button onclick="window.jumpToDate('${ds}')" class="date-chip flex flex-col items-center min-w-[60px] p-4 rounded-2xl glass border border-white/5 ${active ? 'selected' : ''}">
                        <span class="text-[8px] font-bold opacity-40 uppercase">${d.toLocaleDateString('en',{weekday:'short'})}</span>
                        <span class="text-lg font-black">${d.getDate()}</span>
                    </button>`;
            }
        };

        // --- DATA & SYNC ---
        const startSyncListener = (key) => {
            onSnapshot(doc(db, "trackers", key), (snap) => {
                if (snap.exists()) {
                    items = snap.data().items || [];
                    localStorage.setItem('strive_v3', JSON.stringify(items));
                    window.render();
                    document.getElementById('sync-dot').className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]";
                }
            });
        };

        window.connectSync = async () => {
            const key = document.getElementById('sync-key-input').value.trim();
            if (!key) return;
            localStorage.setItem('strive_pro_key', key);
            syncKey = key;
            await setDoc(doc(db, "trackers", key), { items }, { merge: true });
            startSyncListener(key);
            window.closeSync();
        };

        window.render = () => {
            const area = document.getElementById('pillars-render-area');
            area.innerHTML = '';
            ['character', 'health', 'wealth'].forEach(p => {
                const pItems = items.filter(i => i.pillar === p);
                if (pItems.length === 0) return;
                let html = `<div><h2 class="text-[10px] font-black uppercase tracking-[0.3em] mb-4 text-slate-500 ml-2">${p}</h2><div class="space-y-4">`;
                pItems.forEach(item => {
                    const log = item.logs[selectedDate] || { done: false, note: '' };
                    html += `
                        <div class="glass p-5 rounded-[2rem] border-l-4 ${log.done ? 'border-blue-500 bg-blue-500/5' : 'border-transparent'}">
                            <div class="flex items-center justify-between mb-3">
                                <div class="flex items-center gap-4">
                                    <button onclick="window.toggleHabit('${item.id}')" class="w-12 h-12 rounded-2xl border-2 flex items-center justify-center ${log.done ? 'bg-blue-600 border-blue-600' : 'border-slate-700'}">
                                        ${log.done ? '<i data-lucide="check" class="text-white"></i>' : ''}
                                    </button>
                                    <div>
                                        <h3 class="text-sm font-extrabold ${log.done ? 'text-slate-500 line-through' : ''}">${item.name}</h3>
                                        <p class="text-[9px] font-bold text-slate-600 uppercase">Chain: ${calcStreak(item)}</p>
                                    </div>
                                </div>
                                <button onclick="window.deleteItem('${item.id}')" class="p-2 text-slate-800"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                            <input type="text" placeholder="Note..." value="${log.note}" onblur="window.updateNote('${item.id}', this.value)" 
                                   class="w-full bg-slate-900/50 rounded-xl p-3 text-[10px] text-slate-300 outline-none border border-white/5">
                        </div>`;
                });
                area.innerHTML += html + `</div></div>`;
            });
            lucide.createIcons();
            if (document.getElementById('tab-stats').classList.contains('active')) window.updateAnalysis('day');
        };

        // --- CORE FUNCTIONS ---
        window.toggleHabit = (id) => {
            const item = items.find(i => i.id === id);
            if (!item.logs[selectedDate]) item.logs[selectedDate] = { done: false, note: '' };
            item.logs[selectedDate].done = !item.logs[selectedDate].done;
            if (item.logs[selectedDate].done) confetti({ particleCount: 30, spread: 60, origin: { y: 0.8 } });
            save(); window.render();
        };

        window.updateNote = (id, note) => {
            const item = items.find(i => i.id === id);
            if (!item.logs[selectedDate]) item.logs[selectedDate] = { done: false, note: '' };
            item.logs[selectedDate].note = note;
            save();
        };

        const save = async () => {
            localStorage.setItem('strive_v3', JSON.stringify(items));
            if (syncKey) await setDoc(doc(db, "trackers", syncKey), { items });
        };

        window.updateAnalysis = (mode) => {
            const ctx = document.getElementById('analysisChart').getContext('2d');
            if (chart) chart.destroy();
            ['day', 'week', 'month'].forEach(m => document.getElementById('btn-'+m).className = `flex-1 py-2 text-[10px] font-black rounded-xl ${mode === m ? 'bg-blue-600 text-white' : 'text-slate-500'}`);

            let labels = [], data = [];
            if (mode === 'day') {
                for(let i = 6; i >= 0; i--) {
                    const d = new Date(); d.setDate(d.getDate() - i);
                    const ds = d.toLocaleDateString('en-CA');
                    labels.push(d.toLocaleDateString('en', {weekday:'short'}));
                    const count = items.filter(it => it.logs[ds]?.done).length;
                    data.push(items.length ? (count / items.length) * 100 : 0);
                }
            } else if (mode === 'week') {
                for(let i = 3; i >= 0; i--) {
                    labels.push(`W-${i}`);
                    let weekAvg = 0;
                    for(let j = 0; j < 7; j++) {
                        const d = new Date(); d.setDate(d.getDate() - (i*7 + j));
                        weekAvg += items.filter(it => it.logs[d.toLocaleDateString('en-CA')]?.done).length;
                    }
                    data.push(items.length ? (weekAvg / (items.length * 7)) * 100 : 0);
                }
            } else {
                for(let i = 5; i >= 0; i--) {
                    const d = new Date(); d.setMonth(d.getMonth() - i);
                    labels.push(d.toLocaleDateString('en', {month:'short'}));
                    data.push(Math.floor(Math.random() * 40) + 60); // Preview for months
                }
            }

            document.getElementById('stat-pct').innerText = Math.round(data[data.length-1]) + '%';
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ data, borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59,130,246,0.1)', borderWidth: 4, pointRadius: 4 }] },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false, min: 0, max: 100 }, x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 9, weight: 'bold' } } } } }
            });
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('text-blue-500', 'bg-blue-500/10');
                b.classList.add('text-slate-500');
            });
            document.getElementById('nav-'+tab).classList.add('text-blue-500', 'bg-blue-500/10');
            if(tab === 'stats') window.updateAnalysis('day');
        };

        function calcStreak(item) {
            let s = 0; let d = new Date();
            while(item.logs[d.toLocaleDateString('en-CA')]?.done) { s++; d.setDate(d.getDate()-1); }
            return s;
        }

        window.onload = () => {
            if (syncKey) startSyncListener(syncKey);
            window.renderDateSlider();
            window.render();
            lucide.createIcons();
        };

        // UI Helpers
        window.openModal = () => document.getElementById('modal').style.display = 'flex';
        window.closeModal = () => document.getElementById('modal').style.display = 'none';
        window.openSync = () => document.getElementById('sync-modal').style.display = 'flex';
        window.closeSync = () => document.getElementById('sync-modal').style.display = 'none';
        window.saveObjective = () => {
            const name = document.getElementById('obj-name').value;
            const pillar = document.getElementById('obj-pillar').value;
            if(!name) return;
            items.push({ id: Date.now().toString(), name, pillar, logs: {} });
            save(); window.render(); window.closeModal();
            document.getElementById('obj-name').value = '';
        };
        window.deleteItem = (id) => {
            if(confirm('Archive?')) { items = items.filter(i => i.id !== id); save(); window.render(); }
        };
    </script>
</body>
</html>
