<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strive Pro | Mobile Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- PWA Manifest for Mobile -->
    <link rel="manifest" href='data:application/json,{"name":"Strive Habit Tracker","short_name":"Strive","start_url":".","display":"standalone","background_color":"#020617","theme_color":"#3b82f6","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/3208/3208741.png","sizes":"512x512","type":"image/png"}]}'>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; min-height: 100vh; overflow-y: auto; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Drag and Drop Styling */
        .habit-card.dragging { opacity: 0.4; border: 2px dashed #3b82f6; }
        .drag-handle { cursor: grab; padding: 10px; color: #475569; }
        .drag-handle:active { cursor: grabbing; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day-box { aspect-ratio: 1/1; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.03); }
        .day-box.active { background: var(--accent-color); color: white; box-shadow: 0 0 8px var(--accent-color); }
        
        .notification-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 6px; background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid #3b82f6; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight text-white mb-2">My Daily Path</h1>
                <p id="stats-summary" class="text-slate-400">Loading your data...</p>
            </div>
            <div class="flex gap-3">
                <button onclick="requestNotificationPermission()" class="glass p-3 rounded-2xl text-slate-400 hover:text-blue-400">
                    <i data-lucide="bell"></i>
                </button>
                <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-2xl font-bold transition-all shadow-lg shadow-blue-900/20">
                    + Add Habit
                </button>
            </div>
        </header>

        <div id="habits-list" class="space-y-6 pb-20">
            <!-- Habit cards will be injected here -->
        </div>
    </div>

    <!-- Modal for Create/Edit -->
    <div id="habit-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="glass w-full max-w-md p-8 rounded-[2.5rem] border-slate-800">
            <h2 id="modal-title" class="text-2xl font-bold mb-6">New Habit</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Habit Name</label>
                    <input type="text" id="habit-name" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 mt-1 text-white">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Reminder Time (Notification)</label>
                    <input type="time" id="habit-time" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 mt-1 text-white">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Theme Color</label>
                    <div class="flex gap-3 mt-2" id="color-picker">
                        <div onclick="setTheme('#3b82f6')" data-color="#3b82f6" class="w-8 h-8 rounded-full bg-blue-500 color-opt"></div>
                        <div onclick="setTheme('#10b981')" data-color="#10b981" class="w-8 h-8 rounded-full bg-emerald-500 color-opt"></div>
                        <div onclick="setTheme('#f59e0b')" data-color="#f59e0b" class="w-8 h-8 rounded-full bg-amber-500 color-opt"></div>
                        <div onclick="setTheme('#ef4444')" data-color="#ef4444" class="w-8 h-8 rounded-full bg-red-500 color-opt"></div>
                    </div>
                </div>
                <div class="flex gap-3 pt-6">
                    <button onclick="closeModal()" class="flex-1 py-3 rounded-xl bg-slate-800 text-slate-400">Cancel</button>
                    <button onclick="handleHabitSubmit()" class="flex-1 py-3 rounded-xl bg-blue-600 text-white font-bold">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'strive_v5_final';
        let habits = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let selectedColor = '#3b82f6';
        let editingId = null;

        function openModal(id = null) {
            editingId = id;
            const h = habits.find(x => x.id === id);
            document.getElementById('modal-title').innerText = id ? 'Edit Habit' : 'New Habit';
            document.getElementById('habit-name').value = h ? h.name : '';
            document.getElementById('habit-time').value = h ? h.time : '09:00';
            setTheme(h ? h.color : '#3b82f6');
            document.getElementById('habit-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('habit-modal').style.display = 'none'; editingId = null; }

        function setTheme(c) {
            selectedColor = c;
            document.querySelectorAll('.color-opt').forEach(b => {
                b.style.border = b.dataset.color === c ? '2px solid white' : 'none';
            });
        }

        function handleHabitSubmit() {
            const name = document.getElementById('habit-name').value;
            const time = document.getElementById('habit-time').value;
            if(!name) return;

            if (editingId) {
                const h = habits.find(x => x.id === editingId);
                h.name = name; h.time = time; h.color = selectedColor;
            } else {
                habits.push({ id: Date.now(), name, time, color: selectedColor, logs: [] });
            }
            saveAndRender();
            closeModal();
        }

        // Drag and Drop Logic
        let dragSrcEl = null;
        function handleDragStart(e) {
            dragSrcEl = this;
            this.classList.add('dragging');
        }
        function handleDragOver(e) { e.preventDefault(); return false; }
        function handleDragEnd(e) { this.classList.remove('dragging'); }
        function handleDrop(e) {
            e.stopPropagation();
            if (dragSrcEl !== this) {
                const list = [...document.querySelectorAll('.habit-card')];
                const fromIdx = list.indexOf(dragSrcEl);
                const toIdx = list.indexOf(this);
                const [movedHabit] = habits.splice(fromIdx, 1);
                habits.splice(toIdx, 0, movedHabit);
                saveAndRender();
            }
            return false;
        }

        function renderHabits() {
            const list = document.getElementById('habits-list');
            list.innerHTML = '';
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();

            habits.forEach((habit, idx) => {
                const isDoneToday = habit.logs.includes(todayStr);
                const card = document.createElement('div');
                card.className = 'habit-card glass p-6 rounded-[2rem] flex flex-col lg:flex-row gap-6 items-center';
                card.draggable = true;
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragover', handleDragOver);
                card.addEventListener('drop', handleDrop);
                card.addEventListener('dragend', handleDragEnd);

                let calendarHtml = '';
                for(let i=1; i<=daysInMonth; i++) {
                    const dStr = `${today.getFullYear()}-${(today.getMonth()+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
                    const active = habit.logs.includes(dStr);
                    calendarHtml += `<div onclick="toggleDate(${habit.id}, '${dStr}')" class="day-box ${active?'active':''}" style="${active?'--accent-color:'+habit.color:'' }">${i}</div>`;
                }

                card.innerHTML = `
                    <div class="drag-handle"><i data-lucide="grip-vertical"></i></div>
                    <div class="flex-1 w-full">
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <h3 class="text-xl font-bold">${habit.name}</h3>
                                <span class="notification-badge"><i data-lucide="clock" class="inline w-3 h-3 mr-1"></i>${habit.time}</span>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="openModal(${habit.id})" class="text-slate-500 hover:text-white"><i data-lucide="pencil"></i></button>
                                <button onclick="deleteHabit(${habit.id})" class="text-slate-500 hover:text-red-400"><i data-lucide="trash-2"></i></button>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="stat-card glass border-none bg-white/5 p-4 rounded-xl text-center">
                                <p class="text-[10px] uppercase font-bold text-slate-500">Weekly</p>
                                <p class="text-lg font-bold" style="color:${habit.color}">${calculateWeekly(habit)}%</p>
                            </div>
                            <div onclick="toggleDate(${habit.id}, '${todayStr}')" class="cursor-pointer glass border-2 p-4 rounded-xl text-center transition-all ${isDoneToday?'border-emerald-500 bg-emerald-500/10':'border-slate-700'}">
                                <p class="text-xs font-bold">${isDoneToday?'COMPLETE':'MARK DONE'}</p>
                            </div>
                        </div>
                    </div>
                    <div class="w-full lg:w-1/3">
                        <div class="calendar-grid">${calendarHtml}</div>
                    </div>
                `;
                list.appendChild(card);
            });
            updateStats();
            lucide.createIcons();
        }

        function calculateWeekly(h) {
            let count = 0;
            for(let i=0; i<7; i++) {
                const d = new Date(); d.setDate(d.getDate()-i);
                if(h.logs.includes(d.toISOString().split('T')[0])) count++;
            }
            return Math.round((count/7)*100);
        }

        function toggleDate(id, date) {
            const h = habits.find(x => x.id === id);
            const idx = h.logs.indexOf(date);
            if(idx > -1) h.logs.splice(idx, 1);
            else {
                h.logs.push(date);
                if(date === new Date().toISOString().split('T')[0]) confetti({ particleCount: 100, origin: { y: 0.8 } });
            }
            saveAndRender();
        }

        function deleteHabit(id) { if(confirm('Erase this habit?')) { habits = habits.filter(x => x.id !== id); saveAndRender(); } }
        
        function saveAndRender() { localStorage.setItem(STORAGE_KEY, JSON.stringify(habits)); renderHabits(); }

        function updateStats() {
            const todayStr = new Date().toISOString().split('T')[0];
            const done = habits.filter(h => h.logs.includes(todayStr)).length;
            document.getElementById('stats-summary').innerText = habits.length ? `You've conquered ${done} of ${habits.length} habits today!` : "Start by adding a habit.";
        }

        // Notification System
        async function requestNotificationPermission() {
            const permission = await Notification.requestPermission();
            if(permission === 'granted') alert('Notifications Enabled! You will be reminded at your set times.');
        }

        setInterval(() => {
            const now = new Date();
            const currentTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            habits.forEach(h => {
                if(h.time === currentTime && now.getSeconds() < 1) {
                    new Notification(`Time for ${h.name}!`, { body: "Don't break your streak. Do it now!", icon: "https://cdn-icons-png.flaticon.com/512/3208/3208741.png" });
                }
            });
        }, 1000);

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            const swCode = `self.addEventListener('fetch', function(event) { event.respondWith(fetch(event.request)); });`;
            const blob = new Blob([swCode], {type: 'text/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        window.onload = renderHabits;
    </script>
</body>
</html>
