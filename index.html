<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strive Cloud | Sync Habit Tracker</title>
    
    <!-- PWA Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href='data:application/json,{"name":"Strive Cloud","short_name":"Strive","start_url":".","display":"standalone","background_color":"#020617","theme_color":"#3b82f6","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/3208/3208741.png","sizes":"512x512","type":"image/png"}]}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
        .day-box { aspect-ratio: 1/1; font-size: 0.6rem; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); cursor: pointer; }
        .day-box.active { background: var(--c); color: white; box-shadow: 0 0 10px var(--c); }
        .sortable-ghost { opacity: 0.3; background: #3b82f6 !important; }
    </style>
</head>
<body class="p-4 md:p-10 pb-24">

    <div class="max-w-4xl mx-auto">
        <!-- Auth Header -->
        <div id="auth-section" class="flex justify-between items-center mb-10 glass p-4 rounded-2xl">
            <h1 class="text-xl font-extrabold tracking-tight">Strive <span class="text-blue-500">Cloud</span></h1>
            <button id="login-btn" class="bg-white text-black px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-2">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pmsd/google_signin_helper.png" class="w-4"> Sync with Google
            </button>
            <div id="user-info" class="hidden flex items-center gap-3">
                <img id="user-photo" class="w-8 h-8 rounded-full border border-blue-500">
                <button onclick="logout()" class="text-xs text-slate-500 underline">Logout</button>
            </div>
        </div>

        <div id="app-content" class="opacity-50 pointer-events-none">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-3xl font-extrabold">My Journey</h2>
                    <p class="text-slate-400 text-sm">Drag to reorder • Tap to track</p>
                </div>
                <button onclick="toggleModal(true)" class="bg-blue-600 p-3 rounded-2xl shadow-lg shadow-blue-900/40">
                    <i data-lucide="plus"></i>
                </button>
            </div>

            <div id="habits-container" class="space-y-4">
                <!-- Habits injected here -->
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden z-50 p-6 flex items-center justify-center">
        <div class="glass w-full max-w-sm p-8 rounded-[2.5rem]">
            <h3 class="text-2xl font-bold mb-6">New Skill</h3>
            <input type="text" id="h-name" placeholder="Name (e.g. Gym)" class="w-full bg-slate-800 border-none rounded-2xl p-4 mb-4 text-white">
            <input type="time" id="h-time" class="w-full bg-slate-800 border-none rounded-2xl p-4 mb-6 text-white">
            <div class="flex gap-4 mb-8">
                <button onclick="closeModal()" class="flex-1 text-slate-400 font-bold">Cancel</button>
                <button onclick="saveHabit()" class="flex-1 bg-blue-600 py-4 rounded-2xl font-bold">Launch</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 1. PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let habits = [];
        let currentUser = null;

        // Login/Auth Logic
        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-section').classList.add('justify-end');
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('user-photo').src = user.photoURL;
                document.getElementById('app-content').classList.remove('opacity-50', 'pointer-events-none');
                listenToHabits();
            } else {
                location.reload();
            }
        });

        // Real-time Sync Logic
        function listenToHabits() {
            const q = query(collection(db, "users", currentUser.uid, "habits"), orderBy("order"));
            onSnapshot(q, (snapshot) => {
                habits = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render();
            });
        }

        async function saveHabit() {
            const name = document.getElementById('h-name').value;
            const time = document.getElementById('h-time').value;
            if(!name) return;

            const id = Date.now().toString();
            await setDoc(doc(db, "users", currentUser.uid, "habits", id), {
                name, time, order: habits.length, logs: [], color: '#3b82f6'
            });
            closeModal();
        }

        window.toggleDate = async (habitId, dateStr) => {
            const h = habits.find(x => x.id === habitId);
            const newLogs = h.logs.includes(dateStr) 
                ? h.logs.filter(d => d !== dateStr) 
                : [...h.logs, dateStr];
            
            if(!h.logs.includes(dateStr) && dateStr === new Date().toISOString().split('T')[0]) {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
            }

            await setDoc(doc(db, "users", currentUser.uid, "habits", habitId), { logs: newLogs }, { merge: true });
        };

        function render() {
            const container = document.getElementById('habits-container');
            container.innerHTML = '';
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];

            habits.forEach(h => {
                const isDone = h.logs.includes(todayStr);
                const el = document.createElement('div');
                el.className = 'glass p-5 rounded-[2rem] flex items-center gap-4 habit-card';
                el.dataset.id = h.id;

                let calendar = '';
                for(let i=0; i<14; i++) { // Show last 14 days
                    const d = new Date(); d.setDate(d.getDate() - i);
                    const dStr = d.toISOString().split('T')[0];
                    const active = h.logs.includes(dStr);
                    calendar = `<div onclick="toggleDate('${h.id}', '${dStr}')" class="day-box ${active?'active':''}" style="--c:${h.color}">${d.getDate()}</div>` + calendar;
                }

                el.innerHTML = `
                    <div class="drag-handle text-slate-700 cursor-grab"><i data-lucide="grip-vertical"></i></div>
                    <div class="flex-1">
                        <h3 class="font-bold text-lg">${h.name}</h3>
                        <div class="calendar-grid mt-3">${calendar}</div>
                    </div>
                    <div onclick="toggleDate('${h.id}', '${todayStr}')" class="w-14 h-14 rounded-2xl flex items-center justify-center cursor-pointer transition-all ${isDone?'bg-blue-600 shadow-lg shadow-blue-500/50':'bg-slate-800'}">
                        <i data-lucide="${isDone?'check':'circle'}" class="${isDone?'text-white':'text-slate-500'}"></i>
                    </div>
                `;
                container.appendChild(el);
            });
            lucide.createIcons();
            setupSortable();
        }

        function setupSortable() {
            new Sortable(document.getElementById('habits-container'), {
                handle: '.drag-handle',
                animation: 150,
                onEnd: async () => {
                    const rows = [...document.querySelectorAll('.habit-card')];
                    for(let i=0; i<rows.length; i++) {
                        const id = rows[i].dataset.id;
                        await setDoc(doc(db, "users", currentUser.uid, "habits", id), { order: i }, { merge: true });
                    }
                }
            });
        }

        // Global Helpers
        window.toggleModal = (show) => document.getElementById('modal').style.display = show ? 'flex' : 'none';
        window.closeModal = () => window.toggleModal(false);
        window.saveHabit = saveHabit;

        // Service Worker for PWA
        if ('serviceWorker' in navigator) {
            const sw = `self.addEventListener('fetch', (e) => e.respondWith(fetch(e.request)));`;
            navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(sw));
        }
    </script>
</body>
</html>
