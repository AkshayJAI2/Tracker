<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strive | Pro Sync Tracker</title>
    
    <!-- PWA Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href='data:application/json,{"name":"Strive","short_name":"Strive","start_url":".","display":"standalone","background_color":"#020617","theme_color":"#3b82f6","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/3208/3208741.png","sizes":"512x512","type":"image/png"}]}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617; 
            color: #f8fafc; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .glass { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        /* Fixed Calendar Grid */
        .calendar-wrapper {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            width: 100%;
        }

        .day-cell {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.02);
        }

        .day-cell.active {
            background: var(--c);
            color: white;
            box-shadow: 0 4px 12px var(--shadow);
            border: none;
        }

        .day-cell.today {
            border: 1px solid rgba(255,255,255,0.3);
            font-weight: 800;
        }

        .weekday-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            opacity: 0.5;
            margin-bottom: 2px;
        }

        /* Animations */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .pop-effect { animation: pop 0.3s ease-out; }
    </style>
</head>
<body class="p-4 md:p-8 pb-32">

    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight">STRIVE <span class="text-blue-500">PRO</span></h1>
                <div id="sync-indicator" onclick="openSync()" class="text-[10px] font-bold py-1 px-2 rounded-full bg-slate-800 text-slate-400 mt-1 cursor-pointer inline-flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-slate-500" id="status-dot"></span>
                    <span id="status-text">LOCAL MODE</span>
                </div>
            </div>
            <button onclick="openModal()" class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-900/40 active:scale-90 transition-transform">
                <i data-lucide="plus"></i>
            </button>
        </header>

        <!-- Main Container -->
        <div id="habits-list" class="space-y-6">
            <!-- Habit Cards -->
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden z-50 p-6 flex items-center justify-center">
        <div class="glass w-full max-w-sm p-8 rounded-[2.5rem]">
            <h3 id="modal-title" class="text-xl font-bold mb-6 text-center">New Habit</h3>
            <input type="text" id="h-name" placeholder="Name your habit..." class="w-full bg-slate-800 border-none rounded-2xl p-4 mb-6 text-white outline-none ring-2 ring-transparent focus:ring-blue-500 transition-all">
            
            <p class="text-xs font-bold text-slate-500 mb-3 uppercase tracking-widest">Select Theme</p>
            <div class="flex justify-between mb-8">
                <button onclick="setTheme('#3b82f6')" class="w-10 h-10 rounded-full bg-blue-500 ring-offset-4 ring-offset-slate-900 color-ring" id="color-1"></button>
                <button onclick="setTheme('#10b981')" class="w-10 h-10 rounded-full bg-emerald-500" id="color-2"></button>
                <button onclick="setTheme('#f59e0b')" class="w-10 h-10 rounded-full bg-amber-500" id="color-3"></button>
                <button onclick="setTheme('#ef4444')" class="w-10 h-10 rounded-full bg-red-500" id="color-4"></button>
            </div>

            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-4 text-slate-400 font-bold">Cancel</button>
                <button onclick="saveHabit()" class="flex-1 bg-blue-600 py-4 rounded-2xl font-bold shadow-lg">Save</button>
            </div>
        </div>
    </div>

    <!-- Sync Modal -->
    <div id="sync-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden z-50 p-6 flex items-center justify-center">
        <div class="glass w-full max-w-sm p-8 rounded-[2.5rem]">
            <h3 class="text-xl font-bold mb-2">Cloud Sync</h3>
            <p class="text-slate-400 text-xs mb-6">Enter a unique ID to sync this data between your PC and Mobile.</p>
            <input type="text" id="sync-id-input" placeholder="e.g. MySecretTracker99" class="w-full bg-slate-800 border-none rounded-2xl p-4 mb-4 text-white font-bold text-center">
            <button onclick="startSync()" class="w-full bg-white text-black py-4 rounded-2xl font-bold mb-3">Sync Devices</button>
            <button onclick="document.getElementById('sync-modal').style.display='none'" class="w-full text-slate-500 text-xs">Close</button>
        </div>
    </div>

    <script>
        let habits = JSON.parse(localStorage.getItem('strive_v7')) || [];
        let selectedColor = '#3b82f6';
        let editingId = null;
        let syncId = localStorage.getItem('strive_sync_id');

        const listContainer = document.getElementById('habits-list');

        window.onload = () => {
            render();
            if(syncId) {
                document.getElementById('sync-id-input').value = syncId;
                pullSync();
                startAutoSync();
            }
        };

        function openModal(id = null) {
            editingId = id;
            if(id) {
                const h = habits.find(x => x.id === id);
                document.getElementById('h-name').value = h.name;
                selectedColor = h.color;
                document.getElementById('modal-title').innerText = "Edit Habit";
            } else {
                document.getElementById('h-name').value = '';
                document.getElementById('modal-title').innerText = "New Habit";
            }
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function openSync() { document.getElementById('sync-modal').style.display = 'flex'; }
        function setTheme(c) { selectedColor = c; }

        function saveHabit() {
            const name = document.getElementById('h-name').value;
            if(!name) return;

            if(editingId) {
                const h = habits.find(x => x.id === editingId);
                h.name = name; h.color = selectedColor;
            } else {
                habits.push({ id: Date.now().toString(), name, color: selectedColor, logs: [], order: habits.length });
            }
            
            saveData();
            render();
            closeModal();
        }

        function toggleDate(habitId, dateStr) {
            const h = habits.find(x => x.id === habitId.toString());
            const idx = h.logs.indexOf(dateStr);
            
            if(idx > -1) h.logs.splice(idx, 1);
            else {
                h.logs.push(dateStr);
                if(dateStr === getTodayStr()) {
                    confetti({ particleCount: 100, origin: { y: 0.8 }, colors: [h.color] });
                }
            }
            saveData();
            render();
        }

        function deleteHabit(id) {
            if(confirm('Delete this habit?')) {
                habits = habits.filter(h => h.id !== id.toString());
                saveData();
                render();
            }
        }

        function getTodayStr() {
            const d = new Date();
            return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
        }

        function render() {
            listContainer.innerHTML = '';
            const todayStr = getTodayStr();
            const weekDays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            habits.forEach(h => {
                const card = document.createElement('div');
                card.className = 'glass p-5 rounded-[2rem] habit-card';
                card.style.setProperty('--c', h.color);
                card.style.setProperty('--shadow', h.color + '44');

                // Generate last 14 days aligned to columns
                let calendarHtml = '';
                for(let i=13; i>=0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const dStr = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
                    const isToday = dStr === todayStr;
                    const isActive = h.logs.includes(dStr);
                    
                    calendarHtml += `
                        <div onclick="toggleDate('${h.id}', '${dStr}')" 
                             class="day-cell ${isActive?'active':''} ${isToday?'today':''}">
                             <span class="weekday-label">${weekDays[d.getDay()]}</span>
                             ${d.getDate()}
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div onclick="openModal('${h.id}')" class="cursor-pointer">
                            <h3 class="font-extrabold text-lg flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full" style="background:${h.color}"></span>
                                ${h.name}
                            </h3>
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-0.5">
                                ${h.logs.length} Total Days
                            </p>
                        </div>
                        <button onclick="deleteHabit('${h.id}')" class="text-slate-700 hover:text-red-500 transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div class="calendar-wrapper">
                        ${calendarHtml}
                    </div>
                `;
                listContainer.appendChild(card);
            });
            lucide.createIcons();
        }

        // SYNC ENGINE
        async function startSync() {
            const id = document.getElementById('sync-id-input').value.trim().toLowerCase();
            if(!id) return;
            syncId = id;
            localStorage.setItem('strive_sync_id', id);
            await pushSync();
            document.getElementById('sync-modal').style.display = 'none';
            startAutoSync();
        }

        async function pushSync() {
            if(!syncId) return;
            updateStatus('syncing');
            try {
                await fetch(`https://kvdb.io/4yKqPqFkZ8Gg9f9f9f9f9f/${syncId}`, {
                    method: 'POST',
                    body: JSON.stringify(habits)
                });
                updateStatus('synced');
            } catch (e) { updateStatus('error'); }
        }

        async function pullSync() {
            if(!syncId) return;
            try {
                const res = await fetch(`https://kvdb.io/4yKqPqFkZ8Gg9f9f9f9f9f/${syncId}`);
                if(res.ok) {
                    const data = await res.json();
                    if(data && data.length >= 0) {
                        habits = data;
                        localStorage.setItem('strive_v7', JSON.stringify(habits));
                        render();
                    }
                }
            } catch (e) { console.log("Sync error:", e); }
        }

        function startAutoSync() {
            setInterval(pullSync, 10000); // Check for updates from other devices every 10s
        }

        function updateStatus(state) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            if(state === 'syncing') { dot.className = "w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"; text.innerText = "SYNCING..."; }
            if(state === 'synced') { dot.className = "w-1.5 h-1.5 rounded-full bg-emerald-500"; text.innerText = "CLOUD SYNC ACTIVE"; }
            if(state === 'error') { dot.className = "w-1.5 h-1.5 rounded-full bg-red-500"; text.innerText = "SYNC ERROR"; }
        }

        function saveData() {
            localStorage.setItem('strive_v7', JSON.stringify(habits));
            if(syncId) pushSync();
        }
    </script>
</body>
</html>
